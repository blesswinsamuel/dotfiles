version: 3

vars:
  OP_SSH_KEY_REF: '{{ env "OP_SSH_KEY_REF" | default "op://Private/Personal SSH Key/private key" }}'
  MACHINE:
    sh: |
      unameOut="$(uname -s)"
      case "${unameOut}" in
          Linux*)     machine=Linux;;
          Darwin*)    machine=Mac;;
          CYGWIN*)    machine=Cygwin;;
          MINGW*)     machine=MinGw;;
          MSYS_NT*)   machine=Git;;
          *)          machine="UNKNOWN:${unameOut}"
      esac
      echo ${machine}
  HOSTNAME: { sh: "echo ${HOSTNAME:-$(hostname)}" }

tasks:
  print-config:
    cmds:
      - age -d -i <(op read "{{ .OP_SSH_KEY_REF }}") ./config.yaml.age

  edit-config:
    cmds:
      - age -d -i <(op read "{{ .OP_SSH_KEY_REF }}") ./config.yaml.age > /tmp/config.yaml.orig
      - defer: rm /tmp/config.yaml.orig
      - cp /tmp/config.yaml.orig /tmp/config.yaml
      - defer: rm /tmp/config.yaml
      - $EDITOR /tmp/config.yaml
      - |
        if ! cmp -s /tmp/config.yaml.orig /tmp/config.yaml; then
          echo "Updating config.yaml.age"
          curl -s https://github.com/blesswinsamuel.keys | age -R - /tmp/config.yaml > ./config.yaml.age
        fi

  darwin-init:
    cmds:
      - nix run nix-darwin -- switch --flake ~/dotfiles {{ .CLI_ARGS }}
      # - chsh -s /run/current-system/sw/bin/fish

  init:
    cmds:
      - |
        {{- if eq .MACHINE "Mac" }}
        nix run nix-darwin -- switch --flake ~/dotfiles#{{.HOSTNAME}} {{ .CLI_ARGS }}
        {{- else if eq .MACHINE "Linux" }}
        sudo nix run nixpkgs#nixos-rebuild -- switch --flake ~/dotfiles#{{.HOSTNAME}} {{ .CLI_ARGS }}
        {{- else }}
        echo "Unsupported OS"
        {{- end }}
      # - chsh -s /run/current-system/sw/bin/fish

  run-home:
    cmds:
      - go run . -private-key-file <(op read "{{ .OP_SSH_KEY_REF }}")

  switch:
    cmds:
      - |-
        {{- if eq .MACHINE "Mac" }}
        sudo darwin-rebuild switch --flake ~/dotfiles#{{.HOSTNAME}} {{ .CLI_ARGS }}
        {{- else if eq .MACHINE "Linux" }}
        sudo nixos-rebuild switch --flake ~/dotfiles#{{.HOSTNAME}} {{ .CLI_ARGS }}
        {{- else }}
        echo "Unsupported OS"
        {{- end }}
      - task: run-home

  # nixos vscode remote target - https://github.com/microsoft/vscode-remote-release/issues/103#issuecomment-1060907227, https://github.com/microsoft/vscode-remote-release/issues/648#issuecomment-503148523
  switch-nixos-remote:
    cmds:
      #  --install-bootloader (for upgrades)
      - nixos-rebuild --fast --build-host root@hp-laptop --target-host root@hp-laptop switch --flake .#hp-laptop {{ .CLI_ARGS }}

  brew-install:
    desc: Install packages from Brewfile and remove anything not listed (prevents drift)
    cmds:
      - brew bundle install --file ~/.Brewfile

  doctor:
    desc: Check system health (brew drift, nix flake staleness, mise, git status)
    cmds:
      - |
        echo "=== Brew bundle - missing (would be installed) ==="
        brew bundle check --verbose 2>&1 | grep -v "^The Brewfile" || true
        echo ""
        echo "=== Brew bundle - extra (would be cleaned up) ==="
        brew bundle cleanup 2>&1 || true
      - |
        echo ""
        echo "=== Brew outdated packages ==="
        brew outdated || true
      - |
        echo ""
        echo "=== Nix flake inputs ==="
        nix flake metadata --no-update-lock-file ~/dotfiles 2>&1 | grep -E "Last modified|follows|path" | head -20 || true
      - |
        echo ""
        echo "=== mise outdated tools ==="
        mise outdated 2>/dev/null || echo "(mise not available or no config)"
      - |
        echo ""
        echo "=== Dotfiles git status ==="
        git -C ~/dotfiles status --short || true

  maintanence:
    cmds:
      - brew update
      - brew upgrade
      - brew cleanup
      - mise upgrade
      - nix flake update
      - nix store gc
      # - nix-collect-garbage -d
      - docker system prune -f -a --volumes || true
